<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consumo APIs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <nav class="navbar bg-body-tertiary">
      <form form class="container-fluid justify-content-start">
        <button class="btn btn-outline-success me-2" type="button" id="galleryBtn">Galeria Imagenes</button>
        <br><br>
        <div class="input-group flex-nowrap">
          <span class="input-group-text" id="addon-wrapping">Tema Imagenes</span>
          <input type="text" id="searchInput" class="form-control" placeholder="Tema busqueda, para mejor resultado, usar tema en ingles" aria-label="Username" aria-describedby="addon-wrapping">
        </div>
        <br><br>
        <div class="input-group flex-nowrap">
          <span class="input-group-text" id="addon-wrapping">Cantidad Imagenes</span>
          <input type="number" id="itemsNumberInput" class="form-control" placeholder="Cantidad de imagenes a mostrar" aria-label="Username" aria-describedby="addon-wrapping" value="10">
        </div>
    </nav>
    <br><br>
    <div id="result-section">

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./js/app.js"></script>
</body>
</html>
